<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas - Meu Organizador</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/recipes.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Receitas Culinárias</h1>
            <nav>
                <ul class="nav-menu">
                    <li><a href="home.html" data-module="home"><i class="fas fa-home"></i> Início</a></li>
                    <li><a href="calendar.html" data-module="calendar"><i class="fas fa-calendar-alt"></i> Agenda</a></li>
                    <li><a href="recipes.html" data-module="recipes" class="active"><i class="fas fa-utensils"></i> Receitas</a></li>
                    <li><a href="tasks.html" data-module="tasks"><i class="fas fa-tasks"></i> Tarefas</a></li>
                    <li><a href="shopping.html" data-module="shopping"><i class="fas fa-shopping-cart"></i> Compras</a></li>
                </ul>
            </nav>
            <div class="user-menu">
                <div class="user-avatar">JP</div>
                <select id="language-selector">
                    <option value="pt">🇧🇷 Português</option>
                    <option value="en">🇺🇸 English</option>
                    <option value="es">🇪🇸 Español</option>
                </select>
                <button class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main>
            <div class="recipes-header">
                <h2>Minhas Receitas</h2>
                <div class="recipes-actions">
                    <div class="search-box">
                        <input type="text" placeholder="Buscar receitas...">
                        <button><i class="fas fa-search"></i></button>
                    </div>
                    <button id="new-recipe-btn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Nova Receita
                    </button>
                </div>
                <div class="recipes-filter">
                    <button class="filter-btn active">Todas</button>
                    <button class="filter-btn">Favoritas</button>
                    <button class="filter-btn">Café da manhã</button>
                    <button class="filter-btn">Almoço</button>
                    <button class="filter-btn">Jantar</button>
                    <button class="filter-btn">Sobremesas</button>
                </div>
            </div>

            <div class="recipes-grid">
                <!-- Recipe cards will be generated by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Recipe Modal -->
    <div id="recipe-modal" class="modal">
        <div class="modal-content recipe-modal-content">
            <span class="close-modal">&times;</span>
            <h3 id="modal-title">Nova Receita</h3>
            <form id="recipe-form">
                <div class="recipe-form-header">
                    <div class="recipe-image-upload">
                        <div class="image-preview" id="image-preview">
                            <i class="fas fa-camera"></i>
                            <span>Adicionar imagem</span>
                        </div>
                        <input type="file" id="recipe-image" accept="image/*">
                    </div>
                    <div class="recipe-main-info">
                        <div class="form-group">
                            <label for="recipe-name">Nome da Receita</label>
                            <input type="text" id="recipe-name" required>
                        </div>
                        <div class="form-group">
                            <label for="recipe-category">Categoria</label>
                            <select id="recipe-category" required>
                                <option value="">Selecione...</option>
                                <option value="breakfast">Café da manhã</option>
                                <option value="lunch">Almoço</option>
                                <option value="dinner">Jantar</option>
                                <option value="dessert">Sobremesa</option>
                                <option value="snack">Lanche</option>
                                <option value="drink">Bebida</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="recipe-time">Tempo de preparo (min)</label>
                                <input type="number" id="recipe-time" min="1" required>
                            </div>
                            <div class="form-group">
                                <label for="recipe-portions">Porções</label>
                                <input type="number" id="recipe-portions" min="1" required>
                            </div>
                            <div class="form-group">
                                <label for="recipe-difficulty">Dificuldade</label>
                                <select id="recipe-difficulty" required>
                                    <option value="easy">Fácil</option>
                                    <option value="medium">Médio</option>
                                    <option value="hard">Difícil</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="recipe-ingredients">Ingredientes</label>
                    <div class="ingredients-list" id="ingredients-list">
                        <!-- Ingredients will be added here -->
                    </div>
                    <div class="add-ingredient">
                        <input type="text" id="new-ingredient" placeholder="Novo ingrediente">
                        <input type="text" id="new-ingredient-amount" placeholder="Quantidade">
                        <button type="button" id="add-ingredient-btn"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="recipe-instructions">Modo de Preparo</label>
                    <textarea id="recipe-instructions" rows="8" required></textarea>
                </div>

                <div class="form-group">
                    <label for="recipe-notes">Observações</label>
                    <textarea id="recipe-notes" rows="4"></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" id="delete-recipe" class="btn btn-danger">Excluir</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/recipes.js"></script>
</body>
</html>
