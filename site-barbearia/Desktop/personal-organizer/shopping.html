<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras - Meu Organizador</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/shopping.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Lista de Compras</h1>
            <nav>
                <ul class="nav-menu">
                    <li><a href="home.html" data-module="home"><i class="fas fa-home"></i> Início</a></li>
                    <li><a href="calendar.html" data-module="calendar"><i class="fas fa-calendar-alt"></i> Agenda</a></li>
                    <li><a href="recipes.html" data-module="recipes"><i class="fas fa-utensils"></i> Receitas</a></li>
                    <li><a href="tasks.html" data-module="tasks"><i class="fas fa-tasks"></i> Tarefas</a></li>
                    <li><a href="shopping.html" data-module="shopping" class="active"><i class="fas fa-shopping-cart"></i> Compras</a></li>
                </ul>
            </nav>
            <div class="user-menu">
                <div class="user-avatar">JP</div>
                <select id="language-selector">
                    <option value="pt">🇧🇷 Português</option>
                    <option value="en">🇺🇸 English</option>
                    <option value="es">🇪🇸 Español</option>
                </select>
                <button class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main>
            <div class="shopping-header">
                <h2>Minhas Listas de Compras</h2>
                <div class="shopping-actions">
                    <button id="new-list-btn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Nova Lista
                    </button>
                </div>
            </div>

            <div class="shopping-lists">
                <!-- Shopping lists will be generated by JavaScript -->
            </div>
        </main>
    </div>

    <!-- List Modal -->
    <div id="list-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3 id="modal-title">Nova Lista de Compras</h3>
            <form id="list-form">
                <div class="form-group">
                    <label for="list-name">Nome da Lista</label>
                    <input type="text" id="list-name" required>
                </div>
                <div class="form-group">
                    <label for="list-date">Data (opcional)</label>
                    <input type="date" id="list-date">
                </div>
                <div class="form-group">
                    <label>Itens</label>
                    <div class="items-list" id="items-list">
                        <!-- Items will be added here -->
                    </div>
                    <div class="add-item">
                        <input type="text" id="new-item-name" placeholder="Nome do item">
                        <input type="text" id="new-item-quantity" placeholder="Quantidade">
                        <select id="new-item-category">
                            <option value="">Sem categoria</option>
                            <option value="vegetables">Legumes e Verduras</option>
                            <option value="fruits">Frutas</option>
                            <option value="meat">Carnes</option>
                            <option value="dairy">Laticínios</option>
                            <option value="bakery">Padaria</option>
                            <option value="beverages">Bebidas</option>
                            <option value="cleaning">Limpeza</option>
                            <option value="other">Outros</option>
                        </select>
                        <button type="button" id="add-item-btn"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" id="delete-list" class="btn btn-danger">Excluir</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/shopping.js"></script>
</body>
</html>
