<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Meu Organizador</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/calendar.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Agenda</h1>
            <nav>
                <ul class="nav-menu">
                    <li><a href="home.html" data-module="home"><i class="fas fa-home"></i> Início</a></li>
                    <li><a href="calendar.html" data-module="calendar" class="active"><i class="fas fa-calendar-alt"></i> Agenda</a></li>
                    <li><a href="recipes.html" data-module="recipes"><i class="fas fa-utensils"></i> Receitas</a></li>
                    <li><a href="tasks.html" data-module="tasks"><i class="fas fa-tasks"></i> Tarefas</a></li>
                    <li><a href="shopping.html" data-module="shopping"><i class="fas fa-shopping-cart"></i> Compras</a></li>
                </ul>
            </nav>
            <div class="user-menu">
                <div class="user-avatar">JP</div>
                <select id="language-selector">
                    <option value="pt">🇧🇷 Português</option>
                    <option value="en">🇺🇸 English</option>
                    <option value="es">🇪🇸 Español</option>
                </select>
                <button class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main>
            <div class="calendar-header">
                <h2>Meus Compromissos</h2>
                <div class="calendar-actions">
                    <button id="prev-month" class="btn btn-icon"><i class="fas fa-chevron-left"></i></button>
                    <h3 id="current-month">Maio 2023</h3>
                    <button id="next-month" class="btn btn-icon"><i class="fas fa-chevron-right"></i></button>
                    <button id="today-btn" class="btn">Hoje</button>
                    <button id="new-event-btn" class="btn btn-primary"><i class="fas fa-plus"></i> Novo Evento</button>
                </div>
                <div class="calendar-view-options">
                    <button class="view-option active" data-view="month">Mês</button>
                    <button class="view-option" data-view="week">Semana</button>
                    <button class="view-option" data-view="day">Dia</button>
                    <button class="view-option" data-view="list">Lista</button>
                </div>
            </div>

            <div class="calendar-container">
                <div class="calendar-sidebar">
                    <div class="mini-calendar" id="mini-calendar"></div>
                    <div class="event-categories">
                        <h4>Categorias</h4>
                        <ul>
                            <li><span class="category-color work"></span> Trabalho</li>
                            <li><span class="category-color personal"></span> Pessoal</li>
                            <li><span class="category-color health"></span> Saúde</li>
                            <li><span class="category-color family"></span> Família</li>
                        </ul>
                    </div>
                </div>
                <div class="calendar-main">
                    <div id="month-view" class="calendar-view active">
                        <!-- Month view will be generated by JavaScript -->
                    </div>
                    <div id="week-view" class="calendar-view">
                        <!-- Week view will be generated by JavaScript -->
                    </div>
                    <div id="day-view" class="calendar-view">
                        <!-- Day view will be generated by JavaScript -->
                    </div>
                    <div id="list-view" class="calendar-view">
                        <!-- List view will be generated by JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Event Modal -->
    <div id="event-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3 id="modal-title">Novo Compromisso</h3>
            <form id="event-form">
                <div class="form-group">
                    <label for="event-title">Título</label>
                    <input type="text" id="event-title" required>
                </div>
                <div class="form-group">
                    <label for="event-date">Data</label>
                    <input type="date" id="event-date" required>
                </div>
                <div class="form-group time-group">
                    <div>
                        <label for="event-start">Início</label>
                        <input type="time" id="event-start" required>
                    </div>
                    <div>
                        <label for="event-end">Término</label>
                        <input type="time" id="event-end" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="event-location">Localização</label>
                    <input type="text" id="event-location">
                </div>
                <div class="form-group">
                    <label for="event-description">Descrição</label>
                    <textarea id="event-description" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="event-category">Categoria</label>
                    <select id="event-category">
                        <option value="work">Trabalho</option>
                        <option value="personal">Pessoal</option>
                        <option value="health">Saúde</option>
                        <option value="family">Família</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="event-reminder"> Lembrete
                    </label>
                    <select id="reminder-time" disabled>
                        <option value="5">5 minutos antes</option>
                        <option value="15">15 minutos antes</option>
                        <option value="30">30 minutos antes</option>
                        <option value="60">1 hora antes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="event-recurring"> Recorrente
                    </label>
                    <select id="recurring-type" disabled>
                        <option value="daily">Diariamente</option>
                        <option value="weekly">Semanalmente</option>
                        <option value="monthly">Mensalmente</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" id="delete-event" class="btn btn-danger">Excluir</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/calendar.js"></script>
</body>
</html>
