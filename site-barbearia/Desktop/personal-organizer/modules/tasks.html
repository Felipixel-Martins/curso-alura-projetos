<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas - Meu Organizador</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/tasks.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Lista de Tarefas</h1>
            <nav>
                <ul class="nav-menu">
                    <li><a href="home.html" data-module="home"><i class="fas fa-home"></i> Início</a></li>
                    <li><a href="calendar.html" data-module="calendar"><i class="fas fa-calendar-alt"></i> Agenda</a></li>
                    <li><a href="recipes.html" data-module="recipes"><i class="fas fa-utensils"></i> Receitas</a></li>
                    <li><a href="tasks.html" data-module="tasks" class="active"><i class="fas fa-tasks"></i> Tarefas</a></li>
                    <li><a href="shopping.html" data-module="shopping"><i class="fas fa-shopping-cart"></i> Compras</a></li>
                </ul>
            </nav>
            <div class="user-menu">
                <div class="user-avatar">JP</div>
                <select id="language-selector">
                    <option value="pt">🇧🇷 Português</option>
                    <option value="en">🇺🇸 English</option>
                    <option value="es">🇪🇸 Español</option>
                </select>
                <button class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main>
            <div class="tasks-header">
                <h2>Minhas Tarefas</h2>
                <div class="tasks-actions">
                    <div class="search-box">
                        <input type="text" placeholder="Buscar tarefas...">
                        <button><i class="fas fa-search"></i></button>
                    </div>
                    <button id="new-task-btn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Nova Tarefa
                    </button>
                </div>
                <div class="tasks-filter">
                    <button class="filter-btn active">Todas</button>
                    <button class="filter-btn">Hoje</button>
                    <button class="filter-btn">Importantes</button>
                    <button class="filter-btn">Concluídas</button>
                    <button class="filter-btn">Pessoal</button>
                    <button class="filter-btn">Trabalho</button>
                </div>
            </div>

            <div class="tasks-stats">
                <div class="stat-card">
                    <div class="stat-value">12</div>
                    <div class="stat-label">Pendentes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">5</div>
                    <div class="stat-label">Concluídas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">3</div>
                    <div class="stat-label">Atrasadas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">2</div>
                    <div class="stat-label">Importantes</div>
                </div>
            </div>

            <div class="tasks-list">
                <!-- Task items will be generated by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3 id="modal-title">Nova Tarefa</h3>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Título</label>
                    <input type="text" id="task-title" required>
                </div>
                <div class="form-group">
                    <label for="task-description">Descrição</label>
                    <textarea id="task-description" rows="4"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-date">Data</label>
                        <input type="date" id="task-date">
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Prioridade</label>
                        <select id="task-priority">
                            <option value="low">Baixa</option>
                            <option value="medium">Média</option>
                            <option value="high">Alta</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-category">Categoria</label>
                    <select id="task-category">
                        <option value="personal">Pessoal</option>
                        <option value="work">Trabalho</option>
                        <option value="shopping">Compras</option>
                        <option value="health">Saúde</option>
                        <option value="other">Outro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="task-recurring"> Tarefa recorrente
                    </label>
                    <select id="recurring-type" disabled>
                        <option value="daily">Diária</option>
                        <option value="weekly">Semanal</option>
                        <option value="monthly">Mensal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Checklist</label>
                    <div class="checklist-items" id="checklist-items">
                        <!-- Checklist items will be added here -->
                    </div>
                    <div class="add-checklist-item">
                        <input type="text" id="new-checklist-item" placeholder="Novo item">
                        <button type="button" id="add-checklist-btn"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" id="delete-task" class="btn btn-danger">Excluir</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/tasks.js"></script>
</body>
</html>
